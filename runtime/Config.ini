[General]
AlarmCPA=1000
AlarmTCPA=1000
AlarmTime=1000
EnableLaserRadar=1
EnableMilliwaveRadar=1
EnableWideCam=1

; 航迹告警合并 Linux/Windows 差异项（详见源码 AlarmLogicConfig）
[AlarmLogic]
; Mode：0=融合用 trackId(<1万)+鸟情区域 track_type=3 仅 reserved1=3；1=融合用 reserved4+track_type=3 不过滤 reserved1
Mode=0
SaveAlarmToDb=1
RefreshTargetInfoFilterEachLoop=1
AlarmMapPruneNonFirstStaleMs=20000
AlarmMapPruneFirstStaleMs=60000
DedupSameAlarmWindowMs=600000
DedupMatchConditionAndTrack=0
OriginTimeFromTrackMsg=1
OriginTrackTimeIsMs=0
BirdRadarSourceId=9
BirdFilterMode=0
BirdSelfReportSubstrings=自报位
BirdSkipTrackIds=4001,4002,4003,4004,4008,4011
AreaGroupIdAllowList=1,2
NoAlarmGroupIdList=1,2
FuseMapRequireContain=1
TrackAlreadyHasAlarmWindowMs=60000
; 灭告警 filter 存续时间（毫秒），默认 1 小时；过期后自动恢复告警
AlarmFilterTtlMs=3600000
SpeedDoubleCheckFuseTrackOnly=1
DefaultThreatScore=90

; 可疑目标研判：不存库，仅发布 DDS（topic 见 DdsTopic）
[SuspiciousTarget]
Enabled=1
JudgeIntervalMs=5000
SpeedLowThresholdMps=3
SpeedHighThresholdMps=5
ProtectAngleMaxDeg=30
SpeedCheckClearIntervalMin=30
DdsTopic=NewTrackStructSuspicious

[GrpcAlarm]
; 告警快照推送：TrackManager AlarmResultService.UpdateAlarmSnapshot（与 GrpcDestroy 地址/端口独立）
Enabled=1
Host=192.168.18.141
Port=25051
ProducerId=AlarmSys-linux

[GrpcDestroy]
; 灭告警订阅：DestroyEventService.SubscribeDestroyEvents，收到后等同 POST /api/alarm_filter（与 GrpcAlarm 地址/端口独立）
Enabled=1
Host=192.168.18.141
Port=50061

[DDS]
; 0=禁用老 TrackDataClass 订阅，仅用 NewTrackStruct 写 m_mapFuseTrack；1=启用老订阅
TrackEnableOldSubscriber=0
AlarmEventUseProfile=1
; 告警发布 multi/single 各用各的 XML（与现场一致）；未设 AlarmEventXmlMulti 时仍可读旧键 AlarmEventXml
